kind = "web"
previewPath = "/"
title = "Flirt & Play"
version = "1.0.0"
id = "artifacts/flirt-and-play"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19652

[services.development]
run = "pnpm --filter @workspace/flirt-and-play run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flirt-and-play", "run", "build" ]
publicDir = "artifacts/flirt-and-play/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19652"
BASE_PATH = "/"
