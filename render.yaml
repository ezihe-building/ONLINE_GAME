services:
  - type: web
    name: flirt-and-play
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      pnpm install &&
      BASE_PATH=/ pnpm --filter @workspace/flirt-and-play run build &&
      cp -r artifacts/flirt-and-play/dist/public artifacts/api-server/frontend-dist &&
      pnpm --filter @workspace/db run push-force &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flirt-and-play-db
          property: connectionString

databases:
  - name: flirt-and-play-db
    databaseName: flirt_and_play
    plan: free
